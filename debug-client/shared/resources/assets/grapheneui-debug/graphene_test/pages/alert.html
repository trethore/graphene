<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale=1" name="viewport">
<title>Graphene Alert Test</title>
<link href="../style/main.css" rel="stylesheet">
<script type="text/javascript">
    function showAlert() {
        alert("Hello from Graphene");
    }

    function showConfirm() {
        confirm("Confirm from Graphene");
    }

    function showPrompt() {
        prompt("Prompt from Graphene", "default value");
    }
</script>
</head>
<body>
	<h1>Alert/Confirm/Prompt test</h1>
	<p>
		<a href="tests.html">Back to tests page</a>
	</p>
	<button onclick="showAlert()">Alert</button>
	<button onclick="showConfirm()">Confirm</button>
	<button onclick="showPrompt()">Prompt</button>

	<h2>File dialogs</h2>
	<p>
		<label>Single file: <input type="file"></label>
	</p>
	<p>
		<label>Multiple files: <input multiple type="file"></label>
	</p>
	<p>
		<label for="folder-upload">Folder:</label> <input
			aria-describedby="folder-upload-note" disabled id="folder-upload"
			type="file" webkitdirectory> <br> <small
			id="folder-upload-note"> Folder uploads are disabled because
			CEF's Chromium confirmation dialog cannot be safely handled in
			Graphene's off-screen browser. </small>
	</p>
</body>
</html>
