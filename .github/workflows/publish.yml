name: publish

on:
  workflow_dispatch:
    inputs:
      publish_target:
        description: Which publish and release actions to run
        required: true
        default: all
        type: choice
        options:
          - all
          - publish-github
          - publish-maven
          - release-github

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    outputs:
      publish_github_packages: ${{ steps.targets.outputs.publish_github_packages }}
      publish_maven: ${{ steps.targets.outputs.publish_maven }}
      release_github: ${{ steps.targets.outputs.release_github }}
      mod_version: ${{ steps.metadata.outputs.mod_version }}
      tag: ${{ steps.metadata.outputs.tag }}
      release_target: ${{ steps.metadata.outputs.release_target }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: gradle

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: validate workflow ref
        env:
          GITHUB_REF: ${{ github.ref }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "${GITHUB_REF}" != 'refs/heads/main' ]; then
            echo "This workflow can only run from refs/heads/main. Current ref: ${GITHUB_REF} (${GITHUB_REF_NAME})" >&2
            exit 1
          fi

      - name: resolve publish targets
        id: targets
        env:
          PUBLISH_TARGET: ${{ inputs.publish_target }}
        run: |
          case "${PUBLISH_TARGET}" in
            all)
              echo 'publish_github_packages=true' >> "$GITHUB_OUTPUT"
              echo 'publish_maven=true' >> "$GITHUB_OUTPUT"
              echo 'release_github=true' >> "$GITHUB_OUTPUT"
              ;;
            publish-github)
              echo 'publish_github_packages=true' >> "$GITHUB_OUTPUT"
              echo 'publish_maven=false' >> "$GITHUB_OUTPUT"
              echo 'release_github=false' >> "$GITHUB_OUTPUT"
              ;;
            publish-maven)
              echo 'publish_github_packages=false' >> "$GITHUB_OUTPUT"
              echo 'publish_maven=true' >> "$GITHUB_OUTPUT"
              echo 'release_github=false' >> "$GITHUB_OUTPUT"
              ;;
            release-github)
              echo 'publish_github_packages=false' >> "$GITHUB_OUTPUT"
              echo 'publish_maven=false' >> "$GITHUB_OUTPUT"
              echo 'release_github=true' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported publish target: ${PUBLISH_TARGET}" >&2
              exit 1
              ;;
          esac

      - name: resolve release metadata
        id: metadata
        run: |
          mod_version="$(awk -F= '/^mod_version=/{print $2}' gradle.properties)"
          archives_base_name="$(awk -F= '/^archives_base_name=/{print $2}' gradle.properties)"
          tag="v${mod_version}"
          release_target="$(git rev-parse HEAD)"
          release_jar="build/libs/${archives_base_name}-${mod_version}.jar"
          sources_jar="build/libs/${archives_base_name}-${mod_version}-sources.jar"

          echo "mod_version=${mod_version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release_target=${release_target}" >> "$GITHUB_OUTPUT"
          echo "release_jar=${release_jar}" >> "$GITHUB_OUTPUT"
          echo "sources_jar=${sources_jar}" >> "$GITHUB_OUTPUT"

      - name: validate central publishing inputs
        if: steps.targets.outputs.publish_maven == 'true'
        env:
          MOD_VERSION: ${{ steps.metadata.outputs.mod_version }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          if [[ "${MOD_VERSION}" == *-SNAPSHOT ]]; then
            echo "mod_version '${MOD_VERSION}' is a SNAPSHOT. Maven Central requires release versions." >&2
            exit 1
          fi

          for required in MAVEN_CENTRAL_USERNAME MAVEN_CENTRAL_PASSWORD MAVEN_GPG_PRIVATE_KEY MAVEN_GPG_PASSPHRASE; do
            if [ -z "${!required}" ]; then
              echo "Missing required secret: ${required}" >&2
              exit 1
            fi
          done

      - name: build graphene
        env:
          PUBLISH_MAVEN: ${{ steps.targets.outputs.publish_maven }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
        run: |
          gradle_tasks=(clean build)

          if [ "${PUBLISH_MAVEN}" = 'true' ]; then
            gradle_tasks+=(publishMavenJavaPublicationToMavenCentralRepository)
          fi

          ./gradlew "${gradle_tasks[@]}"

      - name: verify maven coordinates in staged artifacts
        if: steps.targets.outputs.publish_maven == 'true'
        env:
          MOD_VERSION: ${{ steps.metadata.outputs.mod_version }}
        run: |
          expected_component_directory="build/central-portal/staging/io/github/trethore/graphene-ui/${MOD_VERSION}"
          if [ ! -d "${expected_component_directory}" ]; then
            echo "Expected staged component directory '${expected_component_directory}' to exist." >&2
            exit 1
          fi

      - name: create maven central bundle
        if: steps.targets.outputs.publish_maven == 'true'
        run: |
          bundle_directory="build/central-portal/staging"
          bundle_path="build/central-portal/central-bundle.zip"

          if [ ! -d "${bundle_directory}" ]; then
            echo "Expected bundle staging directory '${bundle_directory}' to exist." >&2
            exit 1
          fi

          while IFS= read -r -d '' artifact_file; do
            md5sum "${artifact_file}" | cut -d ' ' -f1 > "${artifact_file}.md5"
            sha1sum "${artifact_file}" | cut -d ' ' -f1 > "${artifact_file}.sha1"
            sha256sum "${artifact_file}" | cut -d ' ' -f1 > "${artifact_file}.sha256"
            sha512sum "${artifact_file}" | cut -d ' ' -f1 > "${artifact_file}.sha512"
          done < <(
            find "${bundle_directory}" -type f \
              ! -name '*.md5' \
              ! -name '*.sha1' \
              ! -name '*.sha256' \
              ! -name '*.sha512' \
              -print0
          )

          rm -f "${bundle_path}"
          (
            cd "${bundle_directory}"
            zip --quiet --recurse-paths ../central-bundle.zip .
          )

      - name: build release notes
        if: steps.targets.outputs.release_github == 'true'
        env:
          RELEASE_TAG: ${{ steps.metadata.outputs.tag }}
        run: |
          previous_tag="$(git tag --sort=-creatordate | grep -v "^${RELEASE_TAG}$" | head -n 1 || true)"

          if [ -n "${previous_tag}" ]; then
            commit_list="$(git log --pretty=format:'- %s' "${previous_tag}..HEAD")"
          else
            commit_list="$(git log --pretty=format:'- %s')"
          fi

          if [ -z "${commit_list}" ]; then
            commit_list="- No new commits since the previous release."
          fi

          {
            echo "## Patch Notes"
            echo
            echo "${commit_list}"
          } > release-notes.md

      - name: capture github release artifacts
        if: steps.targets.outputs.release_github == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: github-release-assets
          if-no-files-found: error
          path: |
            release-notes.md
            ${{ steps.metadata.outputs.release_jar }}
            ${{ steps.metadata.outputs.sources_jar }}

      - name: capture github packages publication artifacts
        if: steps.targets.outputs.publish_github_packages == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: github-packages-publication
          if-no-files-found: error
          path: |
            build/libs
            build/publications

      - name: capture maven central bundle
        if: steps.targets.outputs.publish_maven == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: maven-central-bundle
          if-no-files-found: error
          path: build/central-portal/central-bundle.zip

  publish-github-packages:
    needs: build
    if: needs.build.outputs.publish_github_packages == 'true'
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
          cache: gradle

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: download github packages publication artifacts
        uses: actions/download-artifact@v8
        with:
          name: github-packages-publication
          path: build

      - name: verify github packages publication artifacts
        run: |
          if [ ! -d build/libs ]; then
            echo "Expected build/libs to exist after downloading publication artifacts." >&2
            exit 1
          fi

          if [ ! -d build/publications ]; then
            echo "Expected build/publications to exist after downloading publication artifacts." >&2
            exit 1
          fi

      - name: publish to github packages
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew publishMavenJavaPublicationToGitHubPackagesRepository

  release-github:
    needs: build
    if: needs.build.outputs.release_github == 'true'
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    steps:
      - name: download release assets
        uses: actions/download-artifact@v8
        with:
          name: github-release-assets
          path: release-assets

      - name: fail if github release already exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
        run: |
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "GitHub release '${RELEASE_TAG}' already exists. Refusing to create a duplicate release." >&2
            exit 1
          fi

          if git ls-remote --tags "https://github.com/${GH_REPO}.git" "refs/tags/${RELEASE_TAG}" | grep -q .; then
            echo "Git tag '${RELEASE_TAG}' already exists remotely. Refusing to create a release for an existing tag." >&2
            exit 1
          fi

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.build.outputs.tag }}
          RELEASE_NAME: Graphene ${{ needs.build.outputs.mod_version }}
          RELEASE_TARGET: ${{ needs.build.outputs.release_target }}
        run: |
          mapfile -t release_files < <(find release-assets -type f -name '*.jar' | sort)

          if [ ${#release_files[@]} -eq 0 ]; then
            echo "Expected at least one release artifact in release-assets/." >&2
            exit 1
          fi

          if [ ! -f release-assets/release-notes.md ]; then
            echo "Expected release notes file 'release-assets/release-notes.md' to exist." >&2
            exit 1
          fi

          gh release create "${RELEASE_TAG}" "${release_files[@]}" \
            --target "${RELEASE_TARGET}" \
            --title "${RELEASE_NAME}" \
            --notes-file release-assets/release-notes.md

  publish-maven:
    needs: build
    if: needs.build.outputs.publish_maven == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-24.04
    steps:
      - name: download maven central bundle
        uses: actions/download-artifact@v8
        with:
          name: maven-central-bundle
          path: maven-central

      - name: upload bundle to central portal
        env:
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MOD_VERSION: ${{ needs.build.outputs.mod_version }}
        run: |
          bundle_path="maven-central/central-bundle.zip"
          if [ ! -f "${bundle_path}" ]; then
            echo "Expected Maven Central bundle '${bundle_path}' to exist." >&2
            exit 1
          fi

          deployment_name="io.github.trethore:graphene-ui:${MOD_VERSION}"
          auth_token="$(printf '%s:%s' "${MAVEN_CENTRAL_USERNAME}" "${MAVEN_CENTRAL_PASSWORD}" | base64 | tr -d '\n')"
          deployment_id="$(curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Authorization: Bearer ${auth_token}" \
            --form "bundle=@${bundle_path};type=application/octet-stream" \
            "https://central.sonatype.com/api/v1/publisher/upload?name=io.github.trethore%3Agraphene-ui%3A${MOD_VERSION}&publishingType=AUTOMATIC")"

          echo "Uploaded deployment to Central Portal (${deployment_name}): ${deployment_id}"
