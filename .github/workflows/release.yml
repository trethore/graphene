name: release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release destination
        required: true
        default: all
        type: choice
        options:
          - all
          - maven
          - github-release
          - github-packages
      version:
        description: Release version (defaults to the version catalog)
        required: false
        type: string
      draft:
        description: Create the GitHub release as a draft
        required: true
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: prepare release metadata
        id: metadata
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_GITHUB: ${{ inputs.target == 'all' || inputs.target == 'github-release' }}
          REQUESTED_VERSION: ${{ inputs.version }}
        run: scripts/release/prepare.sh "$REQUESTED_VERSION" "$RELEASE_GITHUB" >> "$GITHUB_OUTPUT"

      - name: upload release metadata
        if: inputs.target == 'all' || inputs.target == 'github-release'
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 7

  verify:
    needs: prepare
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: check
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: ./gradlew check -Pmod_version="$RELEASE_VERSION"

  build:
    needs: prepare
    if: inputs.target == 'all' || inputs.target == 'github-release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: ':packages:fabric-1.21.11'
            artifact_directory: packages/fabric-1.21.11/build/github-release
            loader: fabric
            minecraft_version: 1.21.11
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: build
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_PROJECT: ${{ matrix.project }}
        run: ./gradlew "${RELEASE_PROJECT}:stageGithubRelease" -Pmod_version="$RELEASE_VERSION"

      - name: upload runtime jar
        uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.loader }}-${{ matrix.minecraft_version }}
          path: ${{ matrix.artifact_directory }}/*.jar
          if-no-files-found: error
          retention-days: 7

  release-maven:
    needs:
      - prepare
      - verify
    if: inputs.target == 'all' || inputs.target == 'maven'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: validate maven central secrets
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for secret in \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_GPG_PASSPHRASE \
            MAVEN_GPG_PRIVATE_KEY; do
            if [[ -z "${!secret}" ]]; then
              echo "Missing required GitHub Actions secret: ${secret}" >&2
              exit 1
            fi
          done

      - name: stage maven central publication
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ./gradlew \
            :packages:fabric-1.21.11:publishMavenJavaPublicationToMavenCentralBundleRepository \
            -Pmod_version="$RELEASE_VERSION"

      - name: create maven central bundle
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: scripts/release/create-central-bundle.sh "$RELEASE_VERSION"

      - name: upload bundle to maven central
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          bundle_path="build/central-portal/central-bundle.zip"
          auth_token="$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          deployment_id="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${auth_token}" \
              --form "bundle=@${bundle_path};type=application/octet-stream" \
              "https://central.sonatype.com/api/v1/publisher/upload?name=io.github.trethore%3Agraphene-ui%3A${RELEASE_VERSION}&publishingType=AUTOMATIC"
          )"

          echo "Maven Central deployment: ${deployment_id}"

  release-github-packages:
    needs:
      - prepare
      - verify
    if: inputs.target == 'all' || inputs.target == 'github-packages'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: publish to github packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ./gradlew \
            :packages:fabric-1.21.11:publishMavenJavaPublicationToGitHubPackagesRepository \
            -Pmod_version="$RELEASE_VERSION"

  release-github:
    needs:
      - prepare
      - verify
      - build
    if: inputs.target == 'all' || inputs.target == 'github-release'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download release metadata
        uses: actions/download-artifact@v8
        with:
          name: release-metadata
          path: release

      - name: download runtime jars
        uses: actions/download-artifact@v8
        with:
          pattern: runtime-*
          path: release
          merge-multiple: true

      - name: create github release
        env:
          DRAFT: ${{ inputs.draft }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          arguments=(
            release create "$RELEASE_TAG"
            release/*.jar
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "Graphene ${RELEASE_VERSION}"
            --notes-file release/RELEASE_NOTES.md
          )

          if [[ "$DRAFT" == "true" ]]; then
            arguments+=(--draft)
          fi

          gh "${arguments[@]}"
