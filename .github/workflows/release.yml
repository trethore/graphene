name: release

on:
  workflow_dispatch:
    inputs:
      target:
        description: Release destination (ignored in draft mode)
        required: true
        default: all
        type: choice
        options:
          - all
          - maven
          - github-release
          - github-packages
      version:
        description: Emergency override; leave empty to use the version catalog
        required: false
        type: string
      draft:
        description: Create only a draft GitHub release
        required: true
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      github_release_action: ${{ steps.metadata.outputs.github_release_action }}
      tag: ${{ steps.metadata.outputs.tag }}
      version: ${{ steps.metadata.outputs.version }}
    steps:
      - name: checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: prepare release metadata
        id: metadata
        run: scripts/release/prepare.sh "$REQUESTED_VERSION" >> "$GITHUB_OUTPUT"
        env:
          DRAFT: ${{ inputs.draft }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_GITHUB: ${{ inputs.draft || inputs.target == 'all' || inputs.target == 'github-release' }}
          REQUESTED_VERSION: ${{ inputs.version }}

      - name: upload release metadata
        if: inputs.draft || inputs.target == 'all' || inputs.target == 'github-release'
        uses: actions/upload-artifact@v7
        with:
          name: release-metadata
          path: RELEASE_NOTES.md
          if-no-files-found: error
          retention-days: 7

  verify:
    needs: prepare
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: check
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: ./gradlew check -Pmod_version="$RELEASE_VERSION"

  build:
    needs:
      - prepare
      - verify
    if: inputs.draft || inputs.target == 'all' || inputs.target == 'github-release'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: ':packages:fabric-26.2'
            artifact_directory: packages/fabric-26.2/build/github-release
            loader: fabric
            minecraft_version: 26.2
          - project: ':packages:fabric-1.21.11'
            artifact_directory: packages/fabric-1.21.11/build/github-release
            loader: fabric
            minecraft_version: 1.21.11
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: build
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_PROJECT: ${{ matrix.project }}
        run: ./gradlew "${RELEASE_PROJECT}:stageGithubRelease" -Pmod_version="$RELEASE_VERSION"

      - name: upload runtime jar
        uses: actions/upload-artifact@v7
        with:
          name: runtime-${{ matrix.loader }}-${{ matrix.minecraft_version }}
          path: ${{ matrix.artifact_directory }}/*.jar
          if-no-files-found: error
          retention-days: 7

  release-maven:
    needs:
      - prepare
      - verify
      - build
    if: >-
      ${{
        always() &&
        inputs.draft == false &&
        needs.prepare.result == 'success' &&
        needs.verify.result == 'success' &&
        (
          inputs.target == 'maven' ||
          (inputs.target == 'all' && needs.build.result == 'success')
        )
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: validate maven central secrets
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          for secret in \
            MAVEN_CENTRAL_PASSWORD \
            MAVEN_CENTRAL_USERNAME \
            MAVEN_GPG_PASSPHRASE \
            MAVEN_GPG_PRIVATE_KEY; do
            if [[ -z "${!secret}" ]]; then
              echo "Missing required GitHub Actions secret: ${secret}" >&2
              exit 1
            fi
          done

      - name: stage maven central publication
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.MAVEN_GPG_PASSPHRASE }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.MAVEN_GPG_PRIVATE_KEY }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ./gradlew \
            :packages:fabric-26.2:publishMavenJavaPublicationToMavenCentralBundleRepository \
            :packages:fabric-1.21.11:publishMavenJavaPublicationToMavenCentralBundleRepository \
            -Pmod_version="$RELEASE_VERSION"

      - name: create maven central bundle
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: >-
          scripts/release/create-central-bundle.sh "$RELEASE_VERSION"
          graphene-ui-26.2
          graphene-ui-1.21.11

      - name: upload bundle to maven central
        env:
          MAVEN_CENTRAL_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_CENTRAL_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          bundle_path="build/central-portal/central-bundle.zip"
          auth_token="$(printf '%s:%s' "$MAVEN_CENTRAL_USERNAME" "$MAVEN_CENTRAL_PASSWORD" | base64 | tr -d '\n')"
          deployment_id="$(
            curl --fail-with-body --silent --show-error \
              --request POST \
              --header "Authorization: Bearer ${auth_token}" \
              --form "bundle=@${bundle_path};type=application/octet-stream" \
              "https://central.sonatype.com/api/v1/publisher/upload?name=graphene-${RELEASE_VERSION}&publishingType=AUTOMATIC"
          )"

          echo "Maven Central deployment: ${deployment_id}"

  release-github-packages:
    needs:
      - prepare
      - verify
      - build
      - release-maven
    if: >-
      ${{
        always() &&
        inputs.draft == false &&
        needs.prepare.result == 'success' &&
        needs.verify.result == 'success' &&
        (
          inputs.target == 'github-packages' ||
          (
            inputs.target == 'all' &&
            needs.build.result == 'success' &&
            needs.release-maven.result == 'success'
          )
        )
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v6

      - name: setup gradle
        uses: ./.github/actions/setup-gradle

      - name: publish to github packages
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          ./gradlew \
            :packages:fabric-26.2:publishMavenJavaPublicationToGitHubPackagesRepository \
            :packages:fabric-1.21.11:publishMavenJavaPublicationToGitHubPackagesRepository \
            -Pmod_version="$RELEASE_VERSION"

  release-github:
    needs:
      - prepare
      - verify
      - build
      - release-maven
      - release-github-packages
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        needs.verify.result == 'success' &&
        needs.build.result == 'success' &&
        (
          inputs.draft ||
          (inputs.draft == false && inputs.target == 'github-release') ||
          (
            inputs.draft == false &&
            inputs.target == 'all' &&
            needs.release-maven.result == 'success' &&
            needs.release-github-packages.result == 'success'
          )
        )
      }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: download release metadata
        uses: actions/download-artifact@v8
        with:
          name: release-metadata
          path: release

      - name: download runtime jars
        uses: actions/download-artifact@v8
        with:
          pattern: runtime-*
          path: release
          merge-multiple: true

      - name: create or publish github release
        env:
          DRAFT: ${{ inputs.draft }}
          GH_TOKEN: ${{ github.token }}
          RELEASE_ACTION: ${{ needs.prepare.outputs.github_release_action }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          if [[ "$RELEASE_ACTION" == "promote" ]]; then
            gh release upload "$RELEASE_TAG" release/*.jar \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Graphene ${RELEASE_VERSION}" \
              --notes-file release/RELEASE_NOTES.md \
              --draft=false
            exit 0
          fi

          if [[ "$RELEASE_ACTION" != "create" ]]; then
            echo "Unsupported GitHub release action: $RELEASE_ACTION" >&2
            exit 1
          fi

          arguments=(
            release create "$RELEASE_TAG"
            release/*.jar
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "Graphene ${RELEASE_VERSION}"
            --notes-file release/RELEASE_NOTES.md
          )

          if [[ "$DRAFT" == "true" ]]; then
            arguments+=(--draft)
          fi

          gh "${arguments[@]}"
